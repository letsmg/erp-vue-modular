name: 🚀 Build & Deploy Atômico Seguro

on:
  push:
    branches: [main]

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, gd, zip, pgsql

      - name: 📦 Install Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 📝 Prepare Build Env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🔨 Build Vite Assets
        run: |
          npm install
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        run: zip -r deploy.zip . -x ".git/*" "node_modules/*" ".github/*" "tests/*" ".env*" "storage/*"

      - name: 🔑 Configure SSH & Known Hosts
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Deploy Atômico (Zero Downtime)
        run: |
          scp deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/deploy_modular.zip

          ssh ubuntu@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            
            # CONFIGURAÇÃO DE CAMINHOS
            BASE_DIR="/var/www/erp-vue-modular"
            
            # 1. Preparar pasta temporária
            sudo rm -rf ${BASE_DIR}_new
            sudo mkdir -p ${BASE_DIR}_new
            sudo unzip -o /tmp/deploy_modular.zip -d ${BASE_DIR}_new
            
            # 2. AJUSTE DE PERMISSÕES ANTECIPADO
            sudo chown -R www-data:www-data ${BASE_DIR}_new
            sudo chown -R www-data:www-data ${BASE_DIR}_shared/storage
            
            # 3. Linkar arquivos persistentes (Shared)
            # O .env e a pasta storage raiz
            sudo ln -sfn ${BASE_DIR}_shared/.env ${BASE_DIR}_new/.env
            sudo ln -sfn ${BASE_DIR}_shared/storage ${BASE_DIR}_new/storage
            
            # 4. CORREÇÃO DO LINK DE IMAGENS (Resolve 403/404)
            # Removemos o que o zip ou o Laravel tentarem criar e apontamos manualmente para o cofre de fotos
            sudo rm -rf ${BASE_DIR}_new/public/storage
            sudo ln -sfn ${BASE_DIR}_shared/storage/app/public ${BASE_DIR}_new/public/storage
            
            # 5. Comandos Laravel (Rodando como www-data)
            cd ${BASE_DIR}_new
            sudo -u www-data php artisan migrate --force
            sudo -u www-data php artisan db:seed --force
            sudo -u www-data php artisan optimize
            
            # 6. SWAP ATÔMICO (Ativa a nova versão)
            sudo ln -sfn ${BASE_DIR}_new ${BASE_DIR}_live
            
            # 7. Finalização
            sudo systemctl restart php8.3-fpm
            sudo rm /tmp/deploy_modular.zip
            
            echo "✅ Deploy Atômico Modular Finalizado com Sucesso!"
          EOF