name: 🚀 Build & Deploy Atômico Seguro

on:
  push:
    branches: [main]

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, gd, zip, pgsql

      - name: 📦 Install Composer
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 📝 Prepare Build Env
        run: |
          cp .env.example .env
          # Agora o artisan vai funcionar porque a pasta vendor já existe!
          php artisan key:generate

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🔨 Build Vite Assets
        run: |
          npm install
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        # EXCLUSÃO TOTAL de .env e pastas desnecessárias
        run: zip -r deploy.zip . -x ".git/*" "node_modules/*" ".github/*" "tests/*" ".env*" "storage/*"

      - name: 🔑 Configure SSH & Known Hosts
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          # Agora não precisamos de StrictHostKeyChecking=no

      - name: 🚀 Deploy Atômico (Zero Downtime)
        run: |
          scp deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/

          ssh ubuntu@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            
            # 1. Preparar pasta temporária para a nova versão
            sudo rm -rf /var/www/erp-vue-modular_new
            sudo mkdir -p /var/www/erp-vue-modular_new
            sudo unzip -o /tmp/deploy.zip -d /var/www/erp-vue-modular_new
            
            # 2. Linkar o .env e a storage reais do servidor
            sudo ln -sfn /var/www/erp-vue-modular_shared/.env /var/www/erp-vue-modular_new/.env
            sudo ln -sfn /var/www/erp-vue-modular_shared/storage /var/www/erp-vue-modular_new/storage
            
            # 3. Rodar migrations na pasta nova ANTES de ativar o site
            cd /var/www/erp-vue-modular_new
            sudo -u www-data php artisan migrate --seed --force
            sudo -u www-data php artisan storage:link
            sudo -u www-data php artisan optimize
            
            # 4. SWAP: Troca o site antigo pelo novo (Atômico)
            # Se algo falhou acima, esse passo nunca acontece e o site não quebra
            sudo ln -sfn /var/www/erp-vue-modular_new /var/www/erp-vue-modular_live
            
            # 5. Permissões e Cleanup
            sudo chown -R www-data:www-data /var/www/erp-vue-modular_new
            sudo systemctl restart php8.3-fpm
            sudo rm /tmp/deploy.zip
            
            echo "✅ Deploy Atômico Finalizado com Sucesso!"
          EOF