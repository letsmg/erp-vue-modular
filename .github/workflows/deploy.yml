name: 🚀 Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:    
    runs-on: ubuntu-latest
    timeout-minutes: 10  # ⏱️ Segurança - evita execução infinita

    steps:
      - name: 🔑 Configure SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Executar deploy no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@147.15.80.52 << 'EOF'
            set -e
            
            cd /var/www/erp
            
            echo "📥 Atualizando código..."
            git reset --hard
            git pull origin main

            echo "📦 Dependências PHP..."
            # Usamos o cache local para ser instantâneo
            composer install --no-dev --optimize-autoloader --no-interaction --no-progress
            
            echo "📦 Dependências Node..."
            # NÃO apague node_modules. O npm install só baixará o que mudou.
            npm install --no-audit --no-fund
            
            echo "🔨 Build assets..."           
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build

            echo "🗄️ Migrations..."
            php artisan migrate --force
            
            echo "🧹 Otimização Laravel..."
            php artisan optimize
            
            echo "🔐 Permissões cirúrgicas..."
            # Em vez de chown no projeto todo, focamos no necessário
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            echo "🔄 Reiniciando PHP..."
            sudo systemctl restart php8.3-fpm
            
            echo "✅ Deploy finalizado!"
          EOF