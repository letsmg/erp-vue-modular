name: 🚀 Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:    
    runs-on: ubuntu-latest
    timeout-minutes: 10  # ⏱️ Segurança - evita execução infinita

    steps:
      - name: 🔑 Configure SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Executar deploy no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@147.15.80.52 << 'EOF'
            set -e
            
            echo "🛡️ Configurando exceção de segurança do Git"
            git config --global --add safe.directory /var/www/erp

            cd /var/www/erp
            
            echo "📥 Atualizando código..."
            sudo chown -R ubuntu:www-data /var/www/erp
            git reset --hard
            git pull origin main

            echo "📦 Dependências PHP..."
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress
            
            echo "📦 Dependências Node..."
            rm -rf node_modules package-lock.json
            npm install --legacy-peer-deps
            
            echo "🔨 Build assets..."
            npm run build

            echo "🗄️ Migrations..."
            php artisan migrate --force
            
            echo "🧹 Otimização Laravel..."
            php artisan optimize:clear            
            php artisan optimize
            
            echo "🔗 Storage link..."
            rm -rf public/storage && php artisan storage:link            

            echo "🔐 Permissões..."
            sudo chown -R www-data:www-data /var/www/erp
            sudo chmod -R 775 storage bootstrap/cache

            echo "🔄 Reiniciando PHP..."
            sudo systemctl restart php8.3-fpm
            
            echo "✅ Deploy finalizado com sucesso!"
          EOF