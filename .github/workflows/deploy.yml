name: 🚀 Deploy

on:
  workflow_run:
    workflows: ["🚀 CI tests"] # Certifique-se que o nome do arquivo de teste é exatamente este
    types: [completed]
    branches: [main]

jobs:
  deploy: 
    runs-on: ubuntu-latest
    # Trava de segurança: só roda se o teste passou
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 🔑 Configure SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Executar deploy no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@147.15.80.52 << 'EOF'
            set -e
            
            # 1. Garante que o Git não reclame da pasta
            git config --global --add safe.directory /var/www/erp
            cd /var/www/erp
            
            echo "📥 Atualizando código..."
            sudo chown -R ubuntu:www-data /var/www/erp
            git reset --hard
            git pull origin main

            echo "📦 Dependências e Build (com trava de memória)..."
            composer install --no-dev --optimize-autoloader --no-interaction --no-progress
            
            # Otimização: Não apagamos o node_modules para ganhar tempo, 
            # mas limitamos a RAM do Node para não travar o SSH
            npm install --legacy-peer-deps
            
            export NODE_OPTIONS="--max-old-space-size=1024"
            npm run build

            echo "🗄️ Resetando Banco (Portfolio Mode)..."
            php artisan migrate:fresh --seed
            
            echo "🧹 Otimização e Storage..."
            php artisan optimize
            rm -rf public/storage && php artisan storage:link            

            echo "🔐 Permissões..."
            sudo chown -R www-data:www-data /var/www/erp
            sudo chmod -R 775 storage bootstrap/cache

            echo "🔄 Reiniciando PHP..."
            sudo systemctl restart php8.3-fpm
            
            echo "✅ Deploy finalizado!"
          EOF