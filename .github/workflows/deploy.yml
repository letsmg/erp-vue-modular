name: 🚀 Deploy

on:
  push:
    branches: [main]
   
#quando usar em producao, aguardar testes primeiro

#   workflow_run:
#     workflows: ["🚀 CI tests"] # Deve ser o nome exato do outro arquivo
#     types:
#       - completed
#     branches: [main]        

jobs:
  deploy:    
    runs-on: ubuntu-latest
    
    #trava de segurança para substituir o needs em arquivos separados:
    # aqui em baixo está comentado sim mesmo parecendo que não está com #
    # if: ${{ github.event.workflow_run.conclusion == 'success' }} #

    steps:
      - name: 🔑 Configure SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Executar deploy no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@147.15.80.52 << 'EOF'
            set -e
            
            echo "🛡️ Configurando exceção de segurança do Git"
            git config --global --add safe.directory /var/www/erp

            cd /var/www/erp
            
            echo "📥 Atualizando código..."
            sudo chown -R ubuntu:www-data /var/www/erp
            git reset --hard
            git pull origin main

            echo "📦 Dependências e Build..."
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress
            rm -rf node_modules package-lock.json
            npm install --legacy-peer-deps
            npm run build

            echo "🧹 Otimização Laravel..."
            php artisan optimize:clear            
            
            #para refazer o storage link
            rm -rf public/storage && php artisan storage:link            

            echo "🗄️ Migrations..."
            php artisan migrate:fresh --seed
            #php artisan migrate --force

            echo "🔐 Restaurando permissões de produção..."
            sudo chown -R www-data:www-data /var/www/erp
            sudo chmod -R 775 storage bootstrap/cache

            echo "🔄 Reiniciando PHP..."
            sudo systemctl restart php8.3-fpm
            
            echo "✅ Deploy finalizado com sucesso!"
          EOF