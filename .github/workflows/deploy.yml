name: 🚀 CI and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm install
          npm run build

      - name: Run Tests
        run: php artisan test --stop-on-failure
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  deploy:
    needs: test # Só roda se o job acima (test) terminar com sucesso
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Configure SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Executar deploy no servidor
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@147.15.80.52 << 'EOF'
            cd /var/www/erp
            
            echo "📥 Atualizando código..."
            git reset --hard
            git pull origin main

            echo "📦 Dependências e Build..."
            composer install --no-dev --optimize-autoloader
            npm install
            npm run build

            echo "🧹 Otimização Laravel..."
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "🗄️ Migrations..."
            php artisan migrate --force

            echo "🔐 Permissões..."
            sudo chown -R www-data:www-data /var/www/erp
            sudo chmod -R 775 storage bootstrap/cache

            echo "🔄 Reiniciando PHP..."
            sudo systemctl restart php8.3-fpm
            
            echo "✅ Deploy finalizado com sucesso!"
          EOF